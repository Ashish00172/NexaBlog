services:
  postgres:
    image: postgres:16-alpine
    container_name: nexablog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexablog
    ports:
      - "5432:5432"
    volumes:
      - nexablog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexablog"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nexablog_pgdata: